<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal Óbidos - Mapa Cultural</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo"><img src="img/logo.png" style="width:100%; border-radius:4px">ÓBIDOS PA</div>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="mapa.html">Mapa de Óbidos</a></li>
            <li><a href="historias.html">Histórias</a></li>
            <li><a href="cultural.html" class="active">Mapa Cultural</a></li>
            <li><a href="livros.html">Mapa de Livros</a></li>
        </ul>
    </nav>

    <main>
        <h1>Mapa Cultural de Óbidos</h1>
        
        <section class="hero" id="container-postagens">
            <p style="color: #666;">Carregando publicações culturais...</p>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("container-postagens");
            
            try {
                // Rota relativa apontando para a categoria 'cultural' no Render
                const response = await fetch('/api/postagens/cultural');
                
                if (!response.ok) {
                    throw new Error(`Erro na requisição: ${response.status}`);
                }

                const postagens = await response.json();
                console.log("Postagens culturais recebidas:", postagens);

                if (!postagens || postagens.length === 0) {
                    container.innerHTML = "<p>Nenhuma publicação cadastrada nesta categoria cultural.</p>";
                    return;
                }

                container.innerHTML = "";

                postagens.forEach(post => {
                    const postElement = document.createElement("article");
                    postElement.classList.add("card-post");

                    let imgTag = '';
                    if (post.imagem) {
                        const caminhoImagem = post.imagem.startsWith('/') ? post.imagem : `/${post.imagem}`;
                        imgTag = `<img src="${caminhoImagem}" alt="${post.titulo}" style="max-width:100%; max-height:400px; object-fit:cover; border-radius:8px; margin-bottom:15px; display:block;">`;
                    }

                    const tituloText = post.titulo || "Sem título";
                    const dataText = post.data_criacao ? new Date(post.data_criacao).toLocaleDateString('pt-BR') : 'Data desconhecida';
                    const conteudoText = post.conteudo ? post.conteudo.replace(/\n/g, '<br>') : '';

                    postElement.innerHTML = `
                        <h2>${tituloText}</h2>
                        <small style="color: #666; display:block; margin-bottom:10px;">
                            Publicado em: ${dataText}
                        </small>
                        ${imgTag}
                        <p style="line-height: 1.6;">${conteudoText}</p>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                    `;
                    container.appendChild(postElement);
                });

            } catch (error) {
                console.error("Erro ao renderizar posts culturais:", error);
                container.innerHTML = "<p style='color: red;'>Erro ao carregar as postagens culturais. Verifique o console (F12) para detalhes.</p>";
            }
        });
    </script>
</body>
</html>
