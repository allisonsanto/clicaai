<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal Óbidos - Histórias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo"><img src="img/logo.png" style="width:100%; border-radius:4px">ÓBIDOS PA</div>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="mapa.html">Mapa de Óbidos</a></li>
            <li><a href="historias.html">Histórias</a></li>
            <li><a href="cultural.html">Mapa Cultural</a></li>
            <li><a href="livros.html">Mapa de Livros</a></li>
        </ul>
    </nav>

    <main>
        <h1>Histórias de Óbidos</h1>
        
        <section class="hero" id="container-postagens">
            <p style="color: #666;">Carregando histórias...</p>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("container-postagens");
            
            try {
                // Rota relativa apontando para o servidor unificado do Render
                const response = await fetch('/api/postagens/historias');
                const postagens = await response.json();

                if (postagens.length === 0) {
                    container.innerHTML = "<p>Nenhuma história cadastrada nesta categoria.</p>";
                    return;
                }

                container.innerHTML = "";

                postagens.forEach(post => {
                    const postElement = document.createElement("article");
                    postElement.classList.add("card-post");

                    // Monta a tag de imagem se houver imagem na publicação
                    let imgTag = post.imagem ? `<img src="${post.imagem}" alt="${post.titulo}" style="max-width:100%; border-radius:8px; margin-bottom:15px; display:block;">` : '';

                    postElement.innerHTML = `
                        <h2>${post.titulo}</h2>
                        <small style="color: #666; display:block; margin-bottom:10px;">
                            Publicado em: ${new Date(post.data_criacao).toLocaleDateString('pt-BR')}
                        </small>
                        ${imgTag}
                        <p style="line-height: 1.6;">${post.conteudo.replace(/\n/g, '<br>')}</p>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                    `;
                    container.appendChild(postElement);
                });

            } catch (error) {
                console.error("Erro ao renderizar posts:", error);
                container.innerHTML = "<p style='color: red;'>Erro ao carregar as postagens de histórias.</p>";
            }
        });
    </script>
</body>
</html>
