<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal Óbidos - Mapa de Livros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo"><img src="img/logo.png" style="width:100%; border-radius:4px">ÓBIDOS PA</div>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="mapa.html">Mapa de Óbidos</a></li>
            <li><a href="historias.html">Histórias</a></li>
            <li><a href="cultural.html">Mapa Cultural</a></li>
            <li><a href="livros.html" class="active">Mapa de Livros</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <div class="feed-container">
                <h1>Mapa Livros</h1>
                
                <div id="container-postagens">
                    <p>A carregar postagens...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("container-postagens");
            try {
                // Alinhado para buscar a categoria 'livros'
                const response = await fetch('/api/postagens/livros');
                const postagens = await response.json();

                if (postagens.length === 0) {
                    container.innerHTML = "<p>Nenhum livro ou mapa cadastrado nesta categoria.</p>";
                    return;
                }
                container.innerHTML = "";
                postagens.forEach(post => {
                    const postElement = document.createElement("article");
                    postElement.classList.add("card-post");
                    let imgTag = post.imagem ? `<img src="${post.imagem}" alt="${post.titulo}" style="max-width:100%; border-radius:8px; margin-bottom:15px; display:block;">` : '';

                    postElement.innerHTML = `
                        <h2>${post.titulo}</h2>
                        <small style="color: #666; display:block; margin-bottom:10px;">Publicado em: ${new Date(post.data_criacao).toLocaleDateString('pt-BR')}</small>
                        ${imgTag}
                        <p style="line-height: 1.6;">${post.conteudo.replace(/\n/g, '<br>')}</p>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                    `;
                    container.appendChild(postElement);
                });
            } catch (error) {
                console.error("Erro ao renderizar posts:", error);
                container.innerHTML = "<p style='color: red;'>Erro ao carregar o mapa de livros.</p>";
            }
        });
    </script>
</body>
</html>
